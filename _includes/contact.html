<section class="{{ include.section_class | default: 'hero-ish' }}" id="contact">
    <div class="container text-center">
        <h2 class="{{ include.heading_class | default: 'h3' }} mb-3">{{ include.title | default: "Get in touch" }}</h2>
        <p class="text-secondary mb-4 contact-copy">{{ include.subtitle | default: "Email me, connect on LinkedIn, or
            check my GitHub." }}</p>
        <div class="d-flex flex-wrap gap-2 justify-content-center">
            <a class="btn btn-dark rounded-pill" href="mailto:hello@kalashnyk.com"><i
                    class="bi bi-envelope me-1"></i>Email</a>
            <a class="btn btn-outline-dark rounded-pill" target="_blank" rel="noreferrer"
                href="https://www.linkedin.com/in/ykalashn"><i class="bi bi-linkedin me-1"></i>LinkedIn</a>
            <a class="btn btn-outline-dark rounded-pill" target="_blank" rel="noreferrer"
                href="https://github.com/ykalashn"><i class="bi bi-github me-1"></i>GitHub</a>
        </div>
    </div>
</section>
